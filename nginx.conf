# Merrill Digital Systems – nginx config for Docker (e.g. Raspberry Pi)
# Matches Netlify redirects and adds security/cache headers.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json;

  server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Cache static assets
    location ~* \.(css|js|svg)$ {
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Pretty URL redirects (same as Netlify)
    location = /terms {
      return 301 /terms.html;
    }
    location = /privacy/primis {
      return 301 /privacy-primis.html;
    }
    location = /privacy/ops-hub {
      return 301 /privacy-bookkeeping-os.html;
    }

    location / {
      try_files $uri $uri/ $uri.html =404;
    }

    location = / {
      try_files /index.html =404;
    }

    # 404 page
    error_page 404 /404.html;
    location = /404.html {
      internal;
    }
  }
}
