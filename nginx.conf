# Merrill Digital Systems – nginx config for Docker
# Supports HTTP (local/dev) and HTTPS (Cloudflare origin certificates).

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  keepalive_timeout 65;
  gzip on;
  gzip_types text/plain text/css application/javascript application/json;

  # ── HTTP → HTTPS redirect (used when certs are present) ──
  server {
    listen 80;
    server_name _;

    # Health check for Cloudflare Tunnel
    location = /healthz {
      return 200 "ok";
    }

    # Redirect all HTTP to HTTPS when accessed directly
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── www → bare domain redirect ──
  server {
    listen 443 ssl;
    server_name www.merrilldigitalsystems.com;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://merrilldigitalsystems.com$request_uri;
  }

  # ── HTTPS server (Cloudflare origin certificate) ──
  server {
    listen 443 ssl;
    server_name merrilldigitalsystems.com;

    ssl_certificate     /etc/nginx/certs/origin.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # HTML should always revalidate so content updates show quickly.
    location ~* \.html$ {
      add_header Cache-Control "no-cache, must-revalidate";
      add_header Pragma "no-cache";
      add_header Expires "0";
    }

    # CSS/JS should revalidate instead of being immutable.
    # This avoids constant manual cache-busting query bumps.
    location ~* \.(css|js)$ {
      add_header Cache-Control "no-cache, must-revalidate";
      add_header Pragma "no-cache";
      add_header Expires "0";
    }

    # Keep media/fonts cached for performance.
    location ~* \.(svg|jpg|png|webp|woff2?)$ {
      add_header Cache-Control "public, max-age=604800";
    }

    # Legacy pretty paths → canonical .html URLs (avoids duplicate URLs with canonical tags)
    location = /terms {
      return 301 https://merrilldigitalsystems.com/terms.html;
    }
    location = /privacy/primis {
      return 301 https://merrilldigitalsystems.com/privacy-primis.html;
    }
    location = /privacy/ops-hub {
      return 301 https://merrilldigitalsystems.com/privacy-bookkeeping-os.html;
    }

    location = /index.html {
      return 301 https://merrilldigitalsystems.com/;
    }

    location / {
      try_files $uri $uri/ $uri.html =404;
    }

    location = / {
      try_files /index.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
      internal;
    }
  }
}
