# Merrill Digital Systems – Raspberry Pi with Cloudflare Tunnel
# Usage: docker compose up -d

services:
  web:
    build: .
    container_name: merrill-digital-systems
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Mount Cloudflare origin certificates (keep these outside the repo)
      - ./certs:/etc/nginx/certs:ro

  # Cloudflare Tunnel – connects your Pi to Cloudflare without port forwarding
  # Set TUNNEL_TOKEN in your .env file (see DEPLOY.md for steps)
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN}
    depends_on:
      - web
